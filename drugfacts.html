<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
:root {
  --accent:       var(--sakura2);
  --accent-light: var(--sakura-light);
  --accent-glow:  rgba(196,80,94,.12);
}

/* ── Page header ─────────────────────────────────── */
.ref-page-header {
  padding: 40px 0 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; flex-wrap: wrap;
}
.ref-page-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: 10px;
}
.ref-page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 3.8vw, 44px); font-weight: 700;
  line-height: 1.1; letter-spacing: -0.4px; color: var(--ink); margin-bottom: 6px;
}
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-count { font-size: 12px; color: var(--muted); align-self: flex-end; padding-bottom: 6px; white-space: nowrap; }
.ref-count strong { color: var(--ink2); font-weight: 600; }

/* ── Search bar ──────────────────────────────────── */
.ref-search-row { padding: 16px 0 0; }
.ref-search-wrap { position: relative; max-width: 540px; }
.ref-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-size: 13px; color: var(--dim); pointer-events: none;
}
.ref-search-svg { width: 14px; height: 14px; stroke: var(--dim); fill: none; stroke-width: 2; stroke-linecap: round; }
.ref-search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); font-size: 13.5px; color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.ref-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ref-search-input::placeholder { color: var(--dim); }

/* ── Category tabs ───────────────────────────────── */
.cat-tab-bar {
  display: flex; gap: 4px;
  margin-top: 20px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border2);
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.cat-tab-bar::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 6px 14px;
  font-size: 11.5px; font-weight: 600; color: var(--muted);
  border-radius: 99px; border: 1.5px solid transparent;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  background: transparent; font-family: 'DM Sans', sans-serif;
  transition: color .15s, background .15s, border-color .15s; letter-spacing: 0.2px;
}
.cat-tab:hover { color: var(--ink2); background: var(--surface2); }
.cat-tab.active {
  color: var(--accent); background: var(--accent-light);
  border-color: color-mix(in srgb, var(--accent) 30%, transparent);
}
.cat-tab.all-tab { font-weight: 700; }

/* ── Category intro header ───────────────────────── */
.cat-intro {
  margin: 20px 0 4px; padding: 14px 18px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px;
}
.cat-intro-title {
  font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600;
  color: var(--ink); margin-bottom: 5px;
}
.cat-intro-desc { font-size: 12.5px; color: var(--ink2); line-height: 1.6; }

/* ── Group section ───────────────────────────────── */
.group-section { margin-bottom: 8px; }
.group-header {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 6px;
}
.group-header:first-child { margin-top: 20px; }
.group-title {
  font-size: 11px; font-weight: 700; letter-spacing: 1.8px;
  text-transform: uppercase; color: var(--muted); white-space: nowrap;
}
.group-line { flex: 1; height: 1px; background: var(--border2); }
.group-badge { font-size: 10px; font-weight: 600; color: var(--dim); white-space: nowrap; }

.group-actions { display: flex; gap: 6px; margin-bottom: 8px; }
.expand-btn {
  font-size: 10.5px; font-weight: 600; color: var(--muted);
  background: transparent; border: 1.5px solid var(--border);
  border-radius: 99px; padding: 3px 12px; cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: color .14s, border-color .14s, background .14s;
}
.expand-btn:hover {
  color: var(--accent);
  border-color: color-mix(in srgb, var(--accent) 40%, transparent);
  background: var(--accent-light);
}

/* ── Card grid ───────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px; margin-bottom: 4px; align-items: start;
}

/* ── Card ────────────────────────────────────────── */
.rcard {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
}
.rcard::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 12px 0 0 12px;
  background: var(--accent); opacity: 0; transition: opacity .15s;
}
.rcard:hover {
  border-color: color-mix(in srgb, var(--accent) 30%, var(--border));
  box-shadow: 0 3px 16px rgba(42,31,26,.09);
}
.rcard:hover::before, .rcard.expanded::before { opacity: 1; }
.rcard.expanded {
  border-color: color-mix(in srgb, var(--accent) 40%, var(--border));
  box-shadow: 0 3px 16px rgba(42,31,26,.09);
}
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.rcard-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.rcard-header-left { flex: 1; min-width: 0; }
.rcard-name {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600; line-height: 1.3; color: var(--ink);
}
.rcard-aka { font-size: 11.5px; color: var(--muted); font-style: italic; line-height: 1.4; margin-top: 3px; }
.rcard-summary { font-size: 12.5px; color: var(--ink2); line-height: 1.55; margin-top: 6px; }
.rcard-toggle {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 12px; line-height: 1;
  padding: 2px 0 0 4px; align-self: flex-start; margin-top: 2px;
  transition: color .14s, transform .2s ease;
}
.rcard.expanded .rcard-toggle { transform: rotate(180deg); color: var(--accent); }

/* ── Card detail (expanded) ──────────────────────── */
.rcard-detail {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height .32s cubic-bezier(.4,0,.2,1), opacity .22s ease;
}
.rcard.expanded .rcard-detail { max-height: 2400px; opacity: 1; }
.rcard-detail-inner {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border2);
}

.rcard-field { padding: 9px 0; }
.rcard-field:first-child { padding-top: 0; }
.rcard-field + .rcard-field { border-top: 1px solid var(--border2); }
.rcard-field-label {
  display: block; font-size: 9px; font-weight: 700;
  letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 4px;
}
.rcard-field-text { font-size: 13px; color: var(--ink2); line-height: 1.65; }
.rcard-field-text strong { color: var(--ink); font-weight: 600; }

.rcard-pearl {
  margin-top: 10px; padding: 10px 14px; border-radius: 10px;
  background: var(--accent-light);
  border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
}
.rcard-pearl .rcard-field-label { margin-bottom: 4px; }
.rcard-pearl .rcard-field-text { font-size: 12.5px; }

/* ── Search highlight ────────────────────────────── */
mark.search-hl {
  background: color-mix(in srgb, var(--accent) 16%, transparent);
  color: var(--ink); border-radius: 2px; padding: 0 2px; font-style: normal;
}

/* ── Empty state ─────────────────────────────────── */
.ref-empty { grid-column: 1 / -1; padding: 56px 24px; text-align: center; }
.ref-empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600; color: var(--ink2); margin-bottom: 6px;
}
.ref-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Modal (date modal — keep intact) ────────────── */
.modal-group-label {
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; margin-bottom: 4px;
}

/* ── Mobile ──────────────────────────────────────── */
@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr; }
  .ref-page-header { padding-top: 24px; }
  .rcard { padding: 14px 14px; }
  .cat-tab { padding: 5px 11px; font-size: 11px; }
  .cat-intro { padding: 12px 14px; }
}
@media (min-width: 900px) {
  .cat-tab { padding: 6px 11px; font-size: 11px; }
}
@media (min-width: 1100px) {
  .cat-tab { padding: 6px 13px; font-size: 11.5px; }
}
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <!-- ── Header ──────────────────────────────────── -->
  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Step 1 · Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <!-- ── Search ──────────────────────────────────── -->
  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Search drugs, mechanisms, side effects…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <!-- ── Category tabs ───────────────────────────── -->
  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>

  <!-- ── Panels ──────────────────────────────────── -->
  <div id="panels-container"></div>

</div><!-- /wrap -->

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
/* ── Category config ─────────────────────────────────────── */
const CAT_META = {
  autonomic:  { label: 'Autonomic',      desc: 'Parasympathetic (cholinergic) and sympathetic (adrenergic) drug classes. Master receptor subtypes first — M1/M2/M3, α1/α2, β1/β2 — and the drugs fall into place. High-yield for organ-specific side effects and clinical applications.' },
  cv:         { label: 'Cardiovascular', desc: 'The most tested drug system on Step 1. Know ACEi/ARBs cold — they appear in HF, HTN, CKD, and post-MI vignettes. Antiarrhythmic classes: think ion channels first, then drugs. Diuretic electrolyte effects are guaranteed questions.' },
  blood:      { label: 'Blood',          desc: 'Anticoagulants appear on nearly every Step 1 exam — know reversal agents cold. Heparin-induced thrombocytopenia (HIT) is a classic trap. NSAIDs are the most-prescribed drugs in medicine; their mechanism and GI/renal toxicity are ubiquitous.' },
  neuro:      { label: 'Neuro / Psych',  desc: 'Psych block is massive on Step 1. Memorize antidepressant side effect profiles — TCA overdose, SSRI serotonin syndrome, and bupropion seizures appear constantly. Antipsychotic EPS and NMS are classic vignettes. Lithium toxicity has a narrow therapeutic window.' },
  micro:      { label: 'Antimicrobials', desc: 'Organized by mechanism: cell wall inhibitors → protein synthesis → DNA/folate → cell membrane. For each drug know its unique toxicity, not just its coverage. Antibiotic-associated C. diff (clindamycin, fluoroquinolones, cephalosporins) is a perennial vignette.' },
  gi:         { label: 'GI / Hepatic',   desc: 'Focus on acid suppression, motility agents, and mucosal protection. High-yield for C. difficile associations and metabolic interactions with PPIs.' },
  endo:       { label: 'Endocrine',      desc: 'Master the hypothalamic-pituitary axes, diabetes management, and reproductive hormones. High-yield for Step 1 feedback loops and drug-induced endocrine disorders.' },
  pulm:       { label: 'Pulmonary',      desc: 'Asthma step therapy is heavily tested — know which drugs are for acute relief vs. maintenance. Antihistamine receptor subtypes (H1 vs H2) determine organ effects and drug indication.' },
  onco:       { label: 'Oncology',       desc: 'Step 1 tests toxicities more than mechanisms. Every chemotherapy drug has one unique, memorable toxicity — bleomycin → pulmonary fibrosis, cisplatin → nephrotoxicity/ototoxicity, vincristine → peripheral neuropathy (not bone marrow suppression).' },
  toxicology: { label: 'Toxicology',     desc: 'Crucial reversal agents and toxidromes. Focus on the mechanism of toxicity and the logic of the chosen antidote. Know the classic overdose presentations cold.' },
};

let allDrugs = [], activeTab = 'all', searchQ = '';

/* ── Build flat list ─────────────────────────────────────── */
function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

/* ── Filter ──────────────────────────────────────────────── */
function getFiltered() {
  return allDrugs.filter(d => {
    if (activeTab !== 'all' && d.category !== activeTab) return false;
    if (searchQ) {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se, d.ci, d.pk, d.pearl]
        .filter(Boolean).join(' ').toLowerCase();
      if (!blob.includes(searchQ)) return false;
    }
    return true;
  });
}

/* ── Escape HTML ─────────────────────────────────────────── */
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Format: markdown bold + search highlight ────────────── */
function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'),
      '<mark class="search-hl">$1</mark>');
  }
  return out;
}

/* ── Render ──────────────────────────────────────────────── */
function render() {
  const filtered = getFiltered();
  document.getElementById('results-meta').innerHTML =
    filtered.length === allDrugs.length
      ? `<strong>${allDrugs.length}</strong> drugs`
      : `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`;
  renderTabs(filtered);
  renderPanels(filtered);
}

function renderTabs(filtered) {
  let html = `<button class="cat-tab all-tab${activeTab === 'all' ? ' active' : ''}"
    onclick="switchTab('all')" role="tab">All</button>`;
  Object.keys(CAT_META).forEach(cat => {
    if (searchQ && !filtered.some(d => d.category === cat)) return;
    html += `<button class="cat-tab${activeTab === cat ? ' active' : ''}"
      onclick="switchTab('${cat}')" role="tab">${CAT_META[cat].label}</button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered) {
  const container = document.getElementById('panels-container');

  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">No results</div>
        <div class="ref-empty-sub">Try a different search term.</div>
      </div></div>`;
    return;
  }

  const cats = activeTab === 'all'
    ? Object.keys(CAT_META).filter(c => filtered.some(d => d.category === c))
    : [activeTab];

  container.innerHTML = cats.map(cat => {
    const catDrugs = filtered.filter(d => d.category === cat);
    if (!catDrugs.length) return '';
    const groups = [...new Set(catDrugs.map(d => d.groupName))];
    const meta = CAT_META[cat];

    const introHtml = (activeTab === 'all' || cats.length > 1) ? `
      <div class="cat-intro">
        <div class="cat-intro-title">${meta.label}</div>
        <div class="cat-intro-desc">${meta.desc}</div>
      </div>` : `
      <div class="cat-intro" style="margin-top:16px;">
        <div class="cat-intro-desc">${meta.desc}</div>
      </div>`;

    const groupsHtml = groups.map((grp, gi) => {
      const grpDrugs = catDrugs.filter(d => d.groupName === grp);
      const gid = `grp-${cat}-${gi}`;
      return `<div class="group-section">
        <div class="group-header">
          <span class="group-title">${grp}</span>
          <div class="group-line"></div>
          <span class="group-badge">${grpDrugs.length}</span>
        </div>
        <div class="group-actions">
          <button class="expand-btn" onclick="expandAll('${gid}')">Expand all</button>
          <button class="expand-btn" onclick="collapseAll('${gid}')">Collapse all</button>
        </div>
        <div class="cards-grid" id="${gid}">
          ${grpDrugs.map(d => renderCard(d)).join('')}
        </div>
      </div>`;
    }).join('');

    return `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
  }).join('');
}

function renderCard(d) {
  const q = searchQ;
  const sections = [
    ['Mechanism',         d.moa],
    ['Clinical Use',      d.use],
    ['Side Effects',      d.se],
    ['Contraindications', d.ci],
    ['Pharmacokinetics',  d.pk],
  ].filter(([, v]) => v);

  return `<div class="rcard" tabindex="0" role="button"
    aria-label="${esc(d.name)}" aria-expanded="false" onclick="toggleCard(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(d.name, q)}</div>
        ${d.aka ? `<div class="rcard-aka">${fmt(d.aka, q)}</div>` : ''}
      </div>
      <button class="rcard-toggle" tabindex="-1" aria-hidden="true">&#8964;</button>
    </div>
    <div class="rcard-summary">${fmt(d.summary, q)}</div>
    <div class="rcard-detail">
      <div class="rcard-detail-inner">
        ${sections.map(([label, val]) => `
          <div class="rcard-field">
            <span class="rcard-field-label">${label}</span>
            <div class="rcard-field-text">${fmt(val, q)}</div>
          </div>`).join('')}
        ${d.pearl ? `
          <div class="rcard-pearl">
            <span class="rcard-field-label">Clinical Pearl</span>
            <div class="rcard-field-text">${fmt(d.pearl, q)}</div>
          </div>` : ''}
      </div>
    </div>
  </div>`;
}

/* ── Card expand / collapse ──────────────────────────────── */
function toggleCard(el) {
  const expanding = !el.classList.contains('expanded');
  el.classList.toggle('expanded', expanding);
  el.setAttribute('aria-expanded', String(expanding));
}

function expandAll(gid) {
  document.querySelectorAll(`#${gid} .rcard`).forEach(el => {
    el.classList.add('expanded'); el.setAttribute('aria-expanded', 'true');
  });
}
function collapseAll(gid) {
  document.querySelectorAll(`#${gid} .rcard`).forEach(el => {
    el.classList.remove('expanded'); el.setAttribute('aria-expanded', 'false');
  });
}

/* ── Tab switching ───────────────────────────────────────── */
function switchTab(cat) {
  activeTab = cat;
  render();
}

/* ── Search ──────────────────────────────────────────────── */
function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  if (searchQ) activeTab = 'all';
  render();
}

/* ── Keyboard shortcuts ──────────────────────────────────── */
document.addEventListener('keydown', e => {
  // / to focus search
  if (e.key === '/' && document.activeElement !== document.getElementById('drug-search')) {
    e.preventDefault();
    document.getElementById('drug-search').focus();
    document.getElementById('drug-search').select();
  }
  // Enter / Space on card
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault();
    toggleCard(e.target);
  }
  // Escape to close open cards or clear search
  if (e.key === 'Escape') {
    const openCard = document.querySelector('.rcard.expanded:focus');
    if (openCard) { toggleCard(openCard); }
    else if (searchQ) { document.getElementById('drug-search').value = ''; onSearch(); }
  }
});

/* ── Init ────────────────────────────────────────────────── */
window.addEventListener('appAuthStateChanged', () => { if (allDrugs.length) render(); });
document.addEventListener('DOMContentLoaded', () => {
  allDrugs = buildDrugList();
  activeTab = 'all';
  render();
});
</script>
</body>
</html>
