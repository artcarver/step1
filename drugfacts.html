<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Drug Facts · Step 1 Hub</title>
<style>
/* ── Accent tokens ───────────────────────────────────────── */
:root {
  --accent:       var(--sakura2);
  --accent-light: var(--sakura-light);
  --accent-glow:  rgba(196,80,94,.12);

  /* Per-category left-border colors */
  --c-autonomic:  #c4505e;
  --c-cv:         #9e3a5a;
  --c-blood:      #7a3a8a;
  --c-neuro:      #5a4490;
  --c-micro:      #3a6e7a;
  --c-gi:         #9e6a3d;
  --c-endo:       #c08c3e;
  --c-pulm:       #3d6e8a;
  --c-onco:       #3a5a6e;
  --c-toxicology: #a63e3e;
}

/* ── Page header ─────────────────────────────────────────── */
.ref-page-header {
  padding: 40px 0 0;
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 20px; flex-wrap: wrap;
}
.ref-page-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--accent); opacity: .8; margin-bottom: 10px;
}
.ref-page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 3.8vw, 44px); font-weight: 700;
  line-height: 1.1; letter-spacing: -0.4px; color: var(--ink); margin-bottom: 6px;
}
.ref-page-title em { font-style: italic; color: var(--accent); }
.ref-page-sub { font-size: 12px; color: var(--muted); letter-spacing: .3px; margin-top: 4px; }
.ref-count { font-size: 12px; color: var(--muted); align-self: flex-end; padding-bottom: 6px; white-space: nowrap; }
.ref-count strong { color: var(--ink2); font-weight: 600; }

/* ── Search ──────────────────────────────────────────────── */
.ref-search-row { padding: 16px 0 0; }
.ref-search-wrap { position: relative; max-width: 540px; }
.ref-search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  pointer-events: none; display: flex; align-items: center;
}
.ref-search-svg { width: 14px; height: 14px; stroke: var(--dim); fill: none; stroke-width: 2; stroke-linecap: round; }
.ref-search-input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border); border-radius: 99px;
  background: var(--surface); font-size: 13.5px; color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.ref-search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ref-search-input::placeholder { color: var(--dim); }

/* ── Category tabs ───────────────────────────────────────── */
.cat-tab-bar {
  display: flex; gap: 0;
  margin-top: 20px;
  border-bottom: 1px solid var(--border2);
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.cat-tab-bar::-webkit-scrollbar { display: none; }
.cat-tab {
  padding: 11px 16px;
  font-family: 'DM Mono', monospace; font-size: 9.5px;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted); border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  background: transparent;
  transition: color .15s, border-color .15s;
  display: flex; align-items: center; gap: 7px;
}
.cat-tab:hover { color: var(--ink2); }
.cat-tab.active { color: var(--ink); border-bottom-color: var(--accent); }
.tab-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Category intro block ────────────────────────────────── */
.cat-intro {
  border-radius: 16px; padding: 18px 22px;
  margin: 20px 0 28px;
  display: flex; align-items: flex-start; gap: 16px;
  border: 1px solid;
}
.cat-intro-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 600; margin-bottom: 5px; letter-spacing: -0.3px;
}
.cat-intro-desc { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* ── Group section ───────────────────────────────────────── */
.group-section { margin-bottom: 34px; }
.class-group-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.class-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px;
  text-transform: uppercase; padding: 5px 13px;
  display: inline-flex; align-items: center; gap: 7px;
  border-radius: 20px; color: var(--ink2);
  background: var(--surface2); border: 1px solid var(--border);
}
.class-label::before { content: '◆'; font-size: 6px; color: var(--accent); }

.group-expand-btn {
  font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 1px;
  text-transform: uppercase; padding: 4px 12px; border-radius: 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.group-expand-btn:hover { background: var(--surface2); color: var(--ink2); border-color: var(--dim); }

/* ── Card grid ───────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 12px; align-items: start;
}

/* ── Drug card ───────────────────────────────────────────── */
.rcard {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 14px; overflow: hidden;
  cursor: pointer;
  transition: transform .18s ease, box-shadow .18s ease;
  box-shadow: 0 1px 4px rgba(42,31,26,.05);
}
.rcard:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(42,31,26,.10); }
.rcard.expanded { box-shadow: 0 6px 28px rgba(42,31,26,.12); }
.rcard:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* Per-category border colors */
.rcard[data-cat="autonomic"]  { border-left-color: var(--c-autonomic); }
.rcard[data-cat="cv"]         { border-left-color: var(--c-cv); }
.rcard[data-cat="blood"]      { border-left-color: var(--c-blood); }
.rcard[data-cat="neuro"]      { border-left-color: var(--c-neuro); }
.rcard[data-cat="micro"]      { border-left-color: var(--c-micro); }
.rcard[data-cat="gi"]         { border-left-color: var(--c-gi); }
.rcard[data-cat="endo"]       { border-left-color: var(--c-endo); }
.rcard[data-cat="pulm"]       { border-left-color: var(--c-pulm); }
.rcard[data-cat="onco"]       { border-left-color: var(--c-onco); }
.rcard[data-cat="toxicology"] { border-left-color: var(--c-toxicology); }

/* Card header */
.rcard-header {
  padding: 14px 16px 0;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
}
.rcard-header-left { flex: 1; min-width: 0; }
.rcard-name {
  font-family: 'Playfair Display', serif;
  font-size: 16px; font-weight: 600; line-height: 1.25;
  color: var(--ink); letter-spacing: -0.2px;
}
.rcard-aka {
  font-size: 11px; color: var(--muted); font-style: italic;
  line-height: 1.55; margin-top: 5px; word-break: break-word;
}
.rcard-toggle {
  flex-shrink: 0; background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 10px; line-height: 1;
  padding: 4px 0 0 4px; align-self: flex-start;
  font-family: 'DM Mono', monospace;
  transition: color .14s, transform .2s ease;
}
.rcard.expanded .rcard-toggle { transform: rotate(180deg); color: var(--accent); }

/* Summary — always visible */
.rcard-summary {
  padding: 8px 16px 12px;
  font-size: 12px; color: var(--ink2); line-height: 1.6;
  border-bottom: 1px solid rgba(232,221,216,.4);
}
.rcard.expanded .rcard-summary { border-bottom-color: transparent; }

/* ── Expanded detail ─────────────────────────────────────── */
.rcard-detail { display: none; padding: 4px 16px 16px; }
.rcard.expanded .rcard-detail { display: block; animation: slideDown .2s ease; }
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.rcard-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.rcard-field:last-child { margin-bottom: 0; }

/* Colored pill labels */
.rcard-field-label {
  font-family: 'DM Mono', monospace;
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  padding: 4px 9px; border-radius: 6px;
  white-space: nowrap; align-self: flex-start; border: 1px solid;
}
.lbl-moa { background: #f0f4fd; color: #3a5080; border-color: #c8d4f0 !important; }
.lbl-use { background: #edf7f1; color: #3a7a54; border-color: #c4e8d4 !important; }
.lbl-se  { background: #fdeef2; color: #923050; border-color: #f0c4d0 !important; }
.lbl-ci  { background: #fdf4ee; color: #8a4820; border-color: #f0d4c0 !important; }
.lbl-pk  { background: #f3f0fd; color: #5a4898; border-color: #d4c8f0 !important; }

/* Text with left border */
.rcard-field-text {
  font-size: 12.5px; color: var(--ink2); line-height: 1.65;
  padding-left: 12px; margin-left: 4px;
  border-left: 2px solid rgba(232,221,216,.8);
}
.rcard-field-text strong { color: var(--ink); font-weight: 600; }

/* Sentence lines */
.info-line { padding: 4px 0; line-height: 1.6; font-size: 12.5px; color: var(--ink2); }
.info-line:not(:last-child) { border-bottom: 1px dashed rgba(232,221,216,.6); }
.info-line strong { color: var(--ink); font-weight: 600; }

/* Pearl box */
.rcard-pearl {
  display: flex; gap: 10px; align-items: flex-start;
  background: linear-gradient(135deg, var(--sakura-light), #f9eaec);
  border: 1px solid rgba(196,80,94,.25);
  border-radius: 12px; padding: 12px 14px; margin-top: 16px;
}
.pearl-star { color: var(--accent); font-size: 13px; flex-shrink: 0; margin-top: 2px; }
.pearl-body { flex: 1; min-width: 0; }
.pearl-label {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 5px;
}
.pearl-text { font-size: 12.5px; color: var(--ink2); line-height: 1.65; }
.pearl-text strong { color: var(--c-cv); font-weight: 600; }

/* ── Search highlight ────────────────────────────────────── */
mark.search-hl {
  background: color-mix(in srgb, var(--accent) 16%, transparent);
  color: var(--ink); border-radius: 2px; padding: 0 2px; font-style: normal;
}

/* ── Empty state ─────────────────────────────────────────── */
.ref-empty { grid-column: 1 / -1; padding: 56px 24px; text-align: center; }
.ref-empty-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 600; color: var(--ink2); margin-bottom: 6px;
}
.ref-empty-sub { font-size: 13px; color: var(--muted); }

/* ── Mobile ──────────────────────────────────────────────── */
@media (max-width: 640px) {
  .cards-grid { grid-template-columns: 1fr; }
  .ref-page-header { padding-top: 24px; }
  .cat-tab { padding: 10px 12px; font-size: 9px; }
  .cat-intro { padding: 14px 16px; }
}
</style>
</head>
<body>

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<script src="nav.js"></script>

<div class="wrap">

  <div class="ref-page-header">
    <div>
      <div class="ref-page-eyebrow">Step 1 · Pharmacology Reference</div>
      <h1 class="ref-page-title">Drug <em>Facts</em></h1>
      <p class="ref-page-sub">MOA · Uses · Side Effects · PK · Clinical Pearls</p>
    </div>
    <div class="ref-count" id="results-meta"></div>
  </div>

  <div class="ref-search-row">
    <div class="ref-search-wrap">
      <span class="ref-search-icon">
        <svg class="ref-search-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/>
        </svg>
      </span>
      <input class="ref-search-input" type="text" id="drug-search"
             placeholder="Search drug, class, mechanism, side effect…"
             oninput="onSearch()" autocomplete="off"/>
    </div>
  </div>

  <div class="cat-tab-bar" id="cat-tabs" role="tablist"></div>
  <div id="panels-container"></div>

</div>

<script src="drug_data.js"></script>
<script src="app.js"></script>
<script>
const CAT_META = {
  autonomic:  { label: 'Autonomics',     color: '#c4505e', desc: 'Parasympathetic (cholinergic) and sympathetic (adrenergic) drug classes. Master receptor subtypes first — M1/M2/M3, α1/α2, β1/β2 — and the drugs fall into place. High-yield for organ-specific side effects and clinical applications.' },
  cv:         { label: 'Cardio & Renal', color: '#9e3a5a', desc: 'The most tested drug system on Step 1. Know ACEi/ARBs cold — they appear in HF, HTN, CKD, and post-MI vignettes. Antiarrhythmic classes: think ion channels first, then drugs. Diuretic electrolyte effects are guaranteed questions.' },
  blood:      { label: 'Hematology',     color: '#7a3a8a', desc: 'Anticoagulants appear on nearly every Step 1 exam — know reversal agents cold. Heparin-induced thrombocytopenia (HIT) is a classic trap. NSAIDs are the most-prescribed drugs in medicine; their mechanism and GI/renal toxicity are ubiquitous.' },
  neuro:      { label: 'Neuro & Psych',  color: '#5a4490', desc: 'Psych block is massive on Step 1. Memorize antidepressant side effect profiles — TCA overdose, SSRI serotonin syndrome, and bupropion seizures appear constantly. Antipsychotic EPS and NMS are classic vignettes. Lithium toxicity has a narrow therapeutic window.' },
  micro:      { label: 'Microbiology',   color: '#3a6e7a', desc: 'Organized by mechanism: cell wall inhibitors → protein synthesis → DNA/folate → cell membrane. For each drug know its unique toxicity, not just its coverage. Antibiotic-associated C. diff (clindamycin, fluoroquinolones, cephalosporins) is a perennial vignette.' },
  gi:         { label: 'GI & Motility',  color: '#9e6a3d', desc: 'Focus on acid suppression, motility agents, and mucosal protection. High-yield for C. difficile associations and metabolic interactions with PPIs.' },
  endo:       { label: 'Endo & Repro',   color: '#c08c3e', desc: 'Master the hypothalamic-pituitary axes, diabetes management, and reproductive hormones. High-yield for Step 1 feedback loops and drug-induced endocrine disorders.' },
  pulm:       { label: 'Pulmonary',      color: '#3d6e8a', desc: 'Asthma step therapy is heavily tested — know which drugs are for acute relief vs. maintenance. Antihistamine receptor subtypes (H1 vs H2) determine organ effects and drug indication.' },
  onco:       { label: 'Oncology',       color: '#3a5a6e', desc: 'Step 1 tests toxicities more than mechanisms. Every chemotherapy drug has one unique, memorable toxicity — bleomycin → pulmonary fibrosis, cisplatin → nephrotoxicity/ototoxicity, vincristine → peripheral neuropathy (not bone marrow suppression).' },
  toxicology: { label: 'Toxicology',     color: '#a63e3e', desc: 'Crucial reversal agents and toxidromes. Focus on the mechanism of toxicity and the logic of the chosen antidote. Know the classic overdose presentations cold.' },
};

let allDrugs = [], activeTab = 'all', searchQ = '';

function buildDrugList() {
  const list = [];
  Object.entries(DRUGS).forEach(([cat, groups]) =>
    groups.forEach(grp =>
      grp.drugs.forEach(d => list.push({ ...d, category: cat, groupName: grp.group }))
    )
  );
  return list;
}

function getFiltered() {
  return allDrugs.filter(d => {
    if (activeTab !== 'all' && d.category !== activeTab) return false;
    if (searchQ) {
      const blob = [d.name, d.aka, d.summary, d.moa, d.use, d.se, d.ci, d.pk, d.pearl]
        .filter(Boolean).join(' ').toLowerCase();
      if (!blob.includes(searchQ)) return false;
    }
    return true;
  });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(text, q) {
  if (!text) return '';
  let out = esc(text);
  out = out.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  if (q) {
    const sq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(`(${sq})(?![^<]*>)`, 'gi'),
      '<mark class="search-hl">$1</mark>');
  }
  return out;
}

/* Split long text into individual sentence lines with dashed dividers */
function fmtLines(text, q) {
  if (!text) return '';
  let out = fmt(text, q);
  const parts = out.split(/\.\s+(?=[A-Z↑↓(★*<\[0-9])/);
  if (parts.length <= 1) return `<div class="info-line">${out}</div>`;
  return parts.map((p, i) => {
    let line = p.trim();
    if (i < parts.length - 1 && !line.endsWith('.') && !line.endsWith('>') && !line.endsWith(')'))
      line += '.';
    return `<div class="info-line">${line}</div>`;
  }).join('');
}

function render() {
  const filtered = getFiltered();
  document.getElementById('results-meta').innerHTML =
    filtered.length === allDrugs.length
      ? `<strong>${allDrugs.length}</strong> drugs`
      : `<strong>${filtered.length}</strong> of ${allDrugs.length} drugs`;
  renderTabs(filtered);
  renderPanels(filtered);
}

function renderTabs(filtered) {
  let html = `<button class="cat-tab${activeTab==='all'?' active':''}"
    onclick="switchTab('all')" role="tab">All</button>`;
  Object.entries(CAT_META).forEach(([cat, meta]) => {
    if (searchQ && !filtered.some(d => d.category === cat)) return;
    html += `<button class="cat-tab${activeTab===cat?' active':''}"
      onclick="switchTab('${cat}')" role="tab">
      <span class="tab-dot" style="background:${meta.color}"></span>${meta.label}
    </button>`;
  });
  document.getElementById('cat-tabs').innerHTML = html;
}

function renderPanels(filtered) {
  const container = document.getElementById('panels-container');
  if (!filtered.length) {
    container.innerHTML = `<div class="cards-grid" style="margin-top:16px;">
      <div class="ref-empty">
        <div class="ref-empty-title">No results</div>
        <div class="ref-empty-sub">Try a different search term.</div>
      </div></div>`;
    return;
  }

  const cats = activeTab === 'all'
    ? Object.keys(CAT_META).filter(c => filtered.some(d => d.category === c))
    : [activeTab];

  container.innerHTML = cats.map(cat => {
    const catDrugs = filtered.filter(d => d.category === cat);
    if (!catDrugs.length) return '';
    const meta = CAT_META[cat];
    const groups = [...new Set(catDrugs.map(d => d.groupName))];

    const introHtml = `
      <div class="cat-intro" style="border-color:${meta.color}33; background:${meta.color}08">
        <div>
          <div class="cat-intro-title" style="color:${meta.color}">${meta.label}</div>
          <div class="cat-intro-desc">${meta.desc}</div>
        </div>
      </div>`;

    const groupsHtml = groups.map((grp, gi) => {
      const grpDrugs = catDrugs.filter(d => d.groupName === grp);
      const gid = `grp-${cat}-${gi}`;
      return `<div class="group-section">
        <div class="class-group-header">
          <span class="class-label">${grp}</span>
          <button class="group-expand-btn" onclick="toggleGroup('${gid}',this)">▼ Expand</button>
        </div>
        <div class="cards-grid" id="${gid}">
          ${grpDrugs.map(d => renderCard(d)).join('')}
        </div>
      </div>`;
    }).join('');

    return `<div class="ref-panel" id="panel-${cat}">${introHtml}${groupsHtml}</div>`;
  }).join('');
}

function renderCard(d) {
  const q = searchQ;
  const sections = [
    { label: 'Mechanism',        cls: 'lbl-moa', val: d.moa },
    { label: 'Clinical Use',     cls: 'lbl-use', val: d.use },
    { label: 'Side Effects',     cls: 'lbl-se',  val: d.se  },
    { label: 'Contraindications',cls: 'lbl-ci',  val: d.ci  },
    { label: 'Pharmacokinetics', cls: 'lbl-pk',  val: d.pk  },
  ].filter(s => s.val);

  const akaHtml = d.aka
    ? d.aka.replace(/·/g, '<span style="color:var(--dim);font-style:normal;margin:0 3px">·</span>')
    : '';

  return `<div class="rcard" data-cat="${d.category}"
    tabindex="0" role="button" aria-label="${esc(d.name)}" aria-expanded="false"
    onclick="toggleCard(this)">
    <div class="rcard-header">
      <div class="rcard-header-left">
        <div class="rcard-name">${fmt(d.name, q)}</div>
        ${akaHtml ? `<div class="rcard-aka">${akaHtml}</div>` : ''}
      </div>
      <button class="rcard-toggle" tabindex="-1" aria-hidden="true">▼</button>
    </div>
    <div class="rcard-summary">${fmt(d.summary, q)}</div>
    <div class="rcard-detail">
      ${sections.map(s => `
        <div class="rcard-field">
          <span class="rcard-field-label ${s.cls}">${s.label}</span>
          <div class="rcard-field-text">${fmtLines(s.val, q)}</div>
        </div>`).join('')}
      ${d.pearl ? `
        <div class="rcard-pearl">
          <span class="pearl-star">★</span>
          <div class="pearl-body">
            <span class="pearl-label">Clinical Pearl</span>
            <div class="pearl-text">${fmt(d.pearl, q)}</div>
          </div>
        </div>` : ''}
    </div>
  </div>`;
}

function toggleCard(el) {
  if (window.getSelection().toString().length > 0) return;
  const expanding = !el.classList.contains('expanded');
  el.classList.toggle('expanded', expanding);
  el.setAttribute('aria-expanded', String(expanding));
}

function toggleGroup(gid, btn) {
  const cards = document.querySelectorAll(`#${gid} .rcard`);
  const anyOpen = [...cards].some(c => c.classList.contains('expanded'));
  cards.forEach(c => {
    c.classList.toggle('expanded', !anyOpen);
    c.setAttribute('aria-expanded', String(!anyOpen));
  });
  btn.textContent = anyOpen ? '▼ Expand' : '▲ Collapse';
}

function switchTab(cat) {
  activeTab = cat;
  document.querySelectorAll('.group-expand-btn').forEach(b => b.textContent = '▼ Expand');
  render();
}

function onSearch() {
  searchQ = document.getElementById('drug-search').value.toLowerCase().trim();
  if (searchQ) activeTab = 'all';
  render();
}

document.addEventListener('keydown', e => {
  const search = document.getElementById('drug-search');
  if (e.key === '/' && document.activeElement !== search) {
    e.preventDefault(); search.focus(); search.select();
  }
  if ((e.key === 'Enter' || e.key === ' ') && e.target.classList.contains('rcard')) {
    e.preventDefault(); toggleCard(e.target);
  }
  if (e.key === 'Escape') {
    const open = document.querySelector('.rcard.expanded:focus');
    if (open) toggleCard(open);
    else if (searchQ) { search.value = ''; onSearch(); }
  }
});

window.addEventListener('appAuthStateChanged', () => { if (allDrugs.length) render(); });
document.addEventListener('DOMContentLoaded', () => {
  allDrugs = buildDrugList();
  activeTab = 'all';
  render();
});
</script>
</body>
</html>
