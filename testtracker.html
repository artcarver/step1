<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<title>Sketchy Pharm · Step 1 Hub</title>
<style>
:root { --tracker-accent: var(--sakura2); --nav-active-color: var(--sakura2); }

/* ── Tracker Import Modal ─────────────────────────────── */
.ti-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(42,31,26,.45); backdrop-filter: blur(3px);
  align-items: center; justify-content: center;
}
.ti-overlay.open { display: flex; }
.ti-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 28px 24px;
  width: min(560px, 92vw); max-height: 85vh;
  overflow-y: auto; box-shadow: 0 20px 60px rgba(42,31,26,.18);
  display: flex; flex-direction: column; gap: 16px;
}
.ti-header { display: flex; justify-content: space-between; align-items: flex-start; }
.ti-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--ink); }
.ti-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--dim); line-height: 1; padding: 0; }
.ti-desc { font-size: 13px; color: var(--ink2); line-height: 1.6; }
.ti-instruction {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 8px;
  padding: 14px 16px; font-size: 12.5px; color: var(--ink2); line-height: 1.8;
}
.ti-instruction strong { color: var(--ink); }
.ti-prompt-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; padding: 10px 14px;
  font-size: 11.5px; font-family: 'DM Mono', monospace;
  color: var(--ink); line-height: 1.7; margin-top: 8px; white-space: pre-wrap;
}
.ti-paste-area {
  width: 100%; min-height: 100px; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--bg); font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: var(--ink); resize: vertical; outline: none;
  transition: border-color .15s, box-shadow .15s; box-sizing: border-box;
}
.ti-paste-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.ti-paste-area::placeholder { color: var(--muted); }
.ti-actions { display: flex; gap: 10px; justify-content: flex-end; }
.ti-btn-cancel { padding: 8px 18px; border-radius: 99px; border: 1.5px solid var(--border); background: transparent; font-size: 13px; font-weight: 600; color: var(--ink2); cursor: pointer; transition: all .15s; }
.ti-btn-cancel:hover { border-color: var(--dim); }
.ti-btn-import { padding: 8px 20px; border-radius: 99px; border: none; background: var(--accent); font-size: 13px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity .15s; display: flex; align-items: center; gap: 6px; }
.ti-btn-import:hover { opacity: .88; }
.ti-btn-import:disabled { opacity: .5; cursor: default; }
.ti-result { display: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--ink2); line-height: 1.7; }
.ti-result.visible { display: block; }
.ti-result-nums { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
.ti-result-num { text-align: center; }
.ti-result-num strong { display: block; font-size: 24px; font-family: 'Playfair Display', serif; color: var(--accent); }
.ti-result-num span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.ti-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: ti-spin .7s linear infinite; }
@keyframes ti-spin { to { transform: rotate(360deg); } }

</style>
</head>
<body>
<script src="nav.js">

// ── Tracker Import ────────────────────────────────────────
function openTIModal() {
  document.getElementById('ti-overlay').classList.add('open');
  document.getElementById('ti-paste').value = '';
  document.getElementById('ti-result').classList.remove('visible');
  document.getElementById('ti-result').innerHTML = '';
  document.getElementById('ti-import-btn').disabled = false;
  document.getElementById('ti-import-btn').innerHTML = '✦ Import';
  document.getElementById('ti-step1').style.display = 'block';
  document.getElementById('ti-step2').style.display = 'none';
}
function closeTIModal() {
  document.getElementById('ti-overlay').classList.remove('open');
}

function runTIImport() {
  const raw = document.getElementById('ti-paste').value.trim();
  if (!raw) { alert('Please paste the CSV first.'); return; }

  const btn = document.getElementById('ti-import-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="ti-spinner"></span> Importing…';

  try {
    // Parse the CSV (simple — no quoted commas expected in video names)
    const lines = raw.split(/\r?\n/).filter(l => l.trim());
    // Skip header row if present
    const dataLines = lines[0].toLowerCase().includes('videoname') ? lines.slice(1) : lines;

    // Build a lookup: lowercase video name → id
    const lookup = {};
    PHARM_CATEGORIES.forEach(cat => {
      cat.videos.forEach(v => {
        lookup[v.name.toLowerCase()] = v.id;
        // Also index key words for fuzzy match
        lookup[v.name.toLowerCase().replace(/[^a-z0-9 ]/g,'')] = v.id;
      });
    });

    function fuzzyFind(name) {
      const n = name.toLowerCase().trim();
      if (lookup[n]) return lookup[n];
      // Try contains match
      for (const [k, id] of Object.entries(lookup)) {
        if (k.includes(n) || n.includes(k)) return id;
      }
      return null;
    }

    let matched = 0, newW = 0, newR = 0, unmatched = [];

    dataLines.forEach(line => {
      const parts = line.split(',');
      if (parts.length < 2) return;
      const videoName = parts[0].trim().replace(/^"|"$/g,'');
      const watched   = parts[1]?.trim();
      const reviewed  = parts[2]?.trim();
      const isW = ['1','true','yes','✓','x','done','watched'].includes(watched?.toLowerCase());
      const isR = ['1','true','yes','✓','x','done','reviewed'].includes(reviewed?.toLowerCase());

      const id = fuzzyFind(videoName);
      if (!id) { unmatched.push(videoName); return; }

      matched++;
      if (!progress[id]) progress[id] = {w:false,r:false};
      if (isW && !progress[id].w) { progress[id].w = true; newW++; }
      if (isR) {
        progress[id].w = true;
        if (!progress[id].r) { progress[id].r = true; newR++; }
      }
    });

    save();
    renderAll();

    const resultEl = document.getElementById('ti-result');
    resultEl.innerHTML = `
      <strong style="color:var(--ink)">Import complete ✦</strong>
      <div class="ti-result-nums">
        <div class="ti-result-num"><strong>${matched}</strong><span>Matched</span></div>
        <div class="ti-result-num"><strong>${newW}</strong><span>New watched</span></div>
        <div class="ti-result-num"><strong>${newR}</strong><span>New reviewed</span></div>
      </div>
      ${unmatched.length ? `<p style="margin-top:8px;font-size:11.5px;color:var(--dim);">⚠ ${unmatched.length} unmatched: ${unmatched.slice(0,5).join(', ')}${unmatched.length>5?'…':''}</p>` : ''}
      <p style="margin-top:6px;font-size:11.5px;color:var(--dim);">Existing progress was preserved.</p>`;
    resultEl.classList.add('visible');
    btn.innerHTML = '✓ Done';

  } catch(e) {
    console.error('Import error:', e);
    btn.disabled = false;
    btn.innerHTML = '✦ Import';
    alert('Import failed: ' + e.message);
  }
}

</script>

<style>
:root { --tracker-accent: var(--sakura2); --nav-active-color: var(--sakura2); }
</style>
</body>
</html>
